name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
      - name: Verify build output
        run: |
          echo "=== Checking build output ==="
          ls dist/ | head -20
          # Verify index.html has no basePath prefix in asset references
          if grep -q '="/ccstudy-top/' dist/index.html; then
            echo "ERROR: Found /ccstudy-top/ basePath in HTML — custom domain should not use basePath"
            exit 1
          fi
          echo "✓ No basePath leak detected"
          # Verify critical assets exist
          FIRST_ASSET=$(grep -oP '/_next/static/chunks/[^"]+\.js' dist/index.html | head -1)
          if [ -n "$FIRST_ASSET" ]; then
            ASSET_FILE="dist${FIRST_ASSET}"
            if [ ! -f "$ASSET_FILE" ]; then
              echo "ERROR: Referenced asset not found: $ASSET_FILE"
              exit 1
            fi
            echo "✓ Asset exists: $ASSET_FILE"
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
