                - code [ref=e151]: Math.random()
                - text: 不同，Mulberry32 算法使用固定种子，确保相同的输入始终产生相同的输出。 这意味着每个用户 ID 都会对应一个唯一的、可复现的伙伴。
              - paragraph [ref=e152]: 为什么选择确定性而非真随机？因为确定性保证了公平性和可验证性—— 每个用户的伙伴由其 ID 唯一决定，不存在重复或遗漏，也不需要服务器端的状态存储。
