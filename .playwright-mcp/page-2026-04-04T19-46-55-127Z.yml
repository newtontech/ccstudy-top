              - paragraph [ref=e338]: Model Context Protocol —— 连接 AI 与外部世界的标准化协议
            - generic [ref=e339]:
              - paragraph [ref=e340]:
                - strong [ref=e341]: MCP（Model Context Protocol）
                - text: 是 Claude Code 连接外部工具和数据源的标准化协议。 它定义了一套统一的通信规范，让 Claude 能够通过一致的接口访问数据库、API、文件系统等外部资源， 而无需为每种外部服务编写专门的集成代码。
              - paragraph [ref=e342]: MCP 的核心思想是将 AI 与外部世界的连接标准化。任何实现了 MCP 协议的服务端都可以被 Claude Code 直接发现和使用，就像 USB 协议让任何设备都能连接到计算机一样。 这极大地降低了扩展 Claude Code 能力边界的技术门槛。
