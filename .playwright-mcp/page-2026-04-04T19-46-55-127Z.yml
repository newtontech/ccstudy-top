                - paragraph [ref=e475]: 只读的数据访问接口。Claude 可以通过 Resources 读取外部系统的数据，如数据库表结构、API 文档、文件内容等。Resources 的内容会作为上下文注入到对话中。
                - generic [ref=e476]: "示例: 数据库 Schema、API 响应、配置文件、日志文件"
              - generic [ref=e477]:
                - heading "MCP Tools" [level=5] [ref=e479]
                - paragraph [ref=e480]: 可执行的函数调用接口。Claude 可以通过 Tools 调用外部系统的功能，如创建 GitHub Issue、发送 Slack 消息、执行 SQL 查询等。每个 Tool 都有明确的输入 Schema。
