              - paragraph [ref=e468]:
                - text: MCP 定义了两种核心能力：
                - strong [ref=e469]: Resources
                - text: （资源） 和
                - strong [ref=e470]: Tools
                - text: （工具）。 Resources 让 Claude 能够读取外部数据源的内容（如数据库记录、API 响应）， Tools 则让 Claude 能够调用外部函数执行操作（如写入数据库、发送通知）。
            - generic [ref=e471]:
