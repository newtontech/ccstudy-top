                - text: 的源代码。它基于 React 的声明式 UI 模型，但渲染目标从浏览器 DOM 变为了终端的 ANSI 转义序列输出。 这一创新使得开发者可以用熟悉的 React 组件模式来构建丰富的终端交互界面。
              - paragraph [ref=e47]: Ink 的核心思想是：开发者编写 React 组件树，ink 通过自定义的 React Reconciler 将组件树转换为终端可理解的 ANSI 输出流。这意味着你可以使用 props、state、hooks、 context 等 React 核心概念来构建终端应用，同时获得组件复用、状态管理和声明式编程的所有好处。
