              - paragraph [ref=e482]: 高性能大列表渲染的关键技术
            - generic [ref=e483]:
              - paragraph [ref=e484]:
                - text: 终端环境对性能极其敏感，每次渲染都需要重绘整个可见区域。当面对长文件内容、 大量日志输出或搜索结果时，全量渲染会导致严重的性能问题。 Ink 通过
                - strong [ref=e485]: useVirtualScroll
                - text: hook 实现了虚拟滚动机制，只渲染当前可视区域内的列表项， 将渲染开销从 O(n) 降至 O(viewport)。
              - paragraph [ref=e486]: 该 hook 接受列表总数、单项高度、视口高度和 overscan 参数， 计算出当前需要渲染的起止索引和偏移量，确保滚动流畅性的同时将渲染压力降到最低。
