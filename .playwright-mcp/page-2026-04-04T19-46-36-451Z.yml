              - generic [ref=e590]:
                - 'heading "Step 2: 查找与校验" [level=5] [ref=e592]'
                - paragraph [ref=e593]: 从工具注册表中查找目标工具。找到后使用 Zod Schema 验证输入参数的合法性，包括类型检查、必填字段校验和值约束验证。
              - generic [ref=e594]:
                - 'heading "Step 3: 权限检查" [level=5] [ref=e596]'
                - paragraph [ref=e597]: 检查工具权限：先检查 deny 规则（黑名单），再检查 allow 规则（白名单），最后根据权限模式决定是否弹出用户授权对话框。
              - generic [ref=e598]:
                - 'heading "Step 4: 执行与反馈" [level=5] [ref=e600]'
                - paragraph [ref=e601]: 工具执行核心逻辑并返回结果。只读工具可并发执行以提升效率，写操作串行执行以保证数据一致性。结果反馈给 Claude 继续推理。
