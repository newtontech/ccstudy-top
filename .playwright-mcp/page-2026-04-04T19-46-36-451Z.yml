                - code [ref=e610]: isConcurrencySafe
                - text: 属性进行智能调度。只读工具（如文件读取、搜索）可以并发执行以最大化吞吐量， 写操作工具（如文件编辑、命令执行）则必须串行执行以保证数据一致性。
              - paragraph [ref=e611]: 当 Claude 在一次响应中请求调用多个工具时，调度器会自动将它们分组： 所有并发安全的工具作为一批同时执行，非并发安全的工具按顺序逐一执行。
